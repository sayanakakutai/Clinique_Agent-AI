services:
  - type: web
    name: clinique-agent-ai
    env: python
    pythonVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_MODE
        value: auto
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Enter your Google Gemini API Key"
